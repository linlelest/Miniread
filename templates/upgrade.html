<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>极读 - 升级中</title>
<link rel="stylesheet" href="/static/css/style.css">
<style>
.page { min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px; }
.card-center { background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);box-shadow:var(--shadow-lg);max-width:440px;width:100%;padding:40px 28px;text-align:center; }
.icon { font-size:48px;margin-bottom:12px;opacity:0.7; }
h1 { font-size:22px;color:var(--text);margin:0 0 6px; }
p { color:var(--text-muted);font-size:13px;margin-bottom:20px; }
.bar { width:100%;height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin:20px 0; }
.bar .fill { height:100%;background:var(--accent);border-radius:3px;transition:width 0.4s ease;width:0%; }
.pct { font-size:28px;font-weight:700;color:var(--accent); }
.msg { font-size:12px;color:var(--text-muted);margin-top:4px; }
.spinner { display:inline-block;width:18px;height:18px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px; }
.top-bar { position:absolute;top:16px;right:16px; }
</style>
</head>
<body>
<div class="page">
  <div class="top-bar"><button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">☀</button></div>
  <div class="card-center">
    <div class="icon">🔄</div>
    <h1>系统升级中</h1>
    <p><span class="spinner"></span>正在更新到最新版本...</p>
    <div class="bar"><div class="fill" id="fill"></div></div>
    <div class="pct" id="pct">0%</div>
    <div class="msg" id="msg">准备中...</div>
    <p style="font-size:11px;color:var(--text-muted);margin-top:16px;">完成后将自动恢复</p>
  </div>
</div>

<script>
initTheme();
function initTheme(){
  var t=localStorage.getItem('miniread-theme')||'light';
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('themeBtn').textContent=t==='dark'?'☾':'☀';
}
function toggleTheme(){
  var cur=document.documentElement.getAttribute('data-theme');
  var next=cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  localStorage.setItem('miniread-theme',next);
  document.getElementById('themeBtn').textContent=next==='dark'?'☾':'☀';
}
function poll(){
  fetch('/api/public/update-status',{credentials:'same-origin'}).then(function(r){return r.json()}).then(function(d){
    if(d.code===200&&d.data){
      var p=d.data.progress||0,u=d.data.updating;
      document.getElementById('fill').style.width=p+'%';
      document.getElementById('pct').textContent=p+'%';
      if(d.data.message)document.getElementById('msg').textContent=d.data.message;
      if(!u&&p>=100){document.getElementById('msg').textContent='完成，刷新中...';setTimeout(function(){window.location.href='/'},1500);}
    }
  }).catch(function(){document.getElementById('msg').textContent='服务重启中...';});
}
setInterval(poll,2000);poll();
</script>
</body>
</html>
