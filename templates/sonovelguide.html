<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>SoNovel Web 配置教程</title>
<link rel="stylesheet" href="/static/css/style.css">
<style>
.page{padding:24px;max-width:800px;margin:0 auto}
.page h1{font-size:22px;margin:20px 0 12px}
.page h2{font-size:18px;margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.page h3{font-size:15px;margin:14px 0 8px}
.page p{font-size:14px;line-height:1.8;color:var(--text);margin:8px 0}
.page ul,.page ol{padding-left:24px;margin:8px 0}
.page li{font-size:14px;line-height:1.8;margin:4px 0}
.page pre{background:var(--surface-alt);padding:12px 16px;border-radius:8px;overflow-x:auto;border:1px solid var(--border);font-size:13px;line-height:1.6;margin:10px 0}
.page code{background:var(--surface-alt);padding:2px 6px;border-radius:4px;font-size:.9em}
.page blockquote{border-left:3px solid var(--orange);padding:6px 14px;margin:12px 0;background:var(--orange-dim);border-radius:0 6px 6px 0;font-size:13px;color:var(--orange)}
.page a{color:var(--accent);text-decoration:underline}
.page img{max-width:100%;border-radius:8px;margin:10px 0;box-shadow:var(--shadow)}
.page hr{border:none;border-top:1px solid var(--border);margin:20px 0}
.header{display:flex;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);margin-bottom:20px}
.header a{font-size:13px;color:var(--text-muted);text-decoration:none}
.header a:hover{color:var(--text)}
</style>
</head>
<body>
<div class="page">
<div class="header"><a href="/main">← 返回极读</a></div>
<div id="content"></div>
</div>
<script src="/static/js/md-toolbar.js"></script>
<script>
fetch('/aboutsonovelweb.md').then(function(r){return r.text()}).then(function(md){
  document.getElementById('content').innerHTML=MdToolbar.render(md);
}).catch(function(){document.getElementById('content').innerHTML='<p>内容加载失败</p>'});
// Theme
(function(){var t=localStorage.getItem('miniread-theme')||'light';document.documentElement.setAttribute('data-theme',t)})();
</script>
</body>
</html>
