<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Miniread · 极读</title>
<style>
:root{
--c-bg:#050508;--c-fg:#e8eaf2;--c-dim:#4a4d62;--c-line:rgba(255,255,255,.06);
--font:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif
}
*{margin:0;padding:0;box-sizing:border-box}
html{background:var(--c-bg)}
body{font-family:var(--font);background:var(--c-bg);color:var(--c-fg);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

.geo{position:fixed;inset:0;pointer-events:none;z-index:0}
.geo svg{width:100%;height:100%}

.wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}

.title-block{margin-bottom:40px}
.title-sub{font-size:13px;color:var(--c-dim);letter-spacing:4px;text-transform:uppercase;margin-bottom:16px}
.title-main{font-size:clamp(48px,10vw,96px);font-weight:200;letter-spacing:8px;line-height:1;color:var(--c-fg)}
.title-main b{font-weight:600;letter-spacing:4px}
.title-line{width:40px;height:1px;background:var(--c-fg);margin:20px auto 0;opacity:.3}

/* Pills */
.pills-wrap{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-bottom:48px;max-width:600px}
.pill{padding:10px 24px;border-radius:100px;font-size:13px;color:var(--c-dim);border:1px solid var(--c-line);background:transparent;transition:all .35s ease;cursor:default;white-space:nowrap}
.pill:hover{color:var(--c-fg);border-color:rgba(255,255,255,.18);background:rgba(255,255,255,.02)}
.pill.highlight{color:var(--c-fg);border-color:rgba(255,255,255,.2)}

/* Mobile extras */
.mobile-extras{display:none;flex-wrap:wrap;justify-content:center;gap:10px;margin-bottom:48px;overflow:hidden;max-height:0;opacity:0;transition:max-height .45s ease,opacity .35s ease,margin-top .45s ease}
.mobile-extras.show{max-height:180px;opacity:1;margin-top:10px}
.expand-btn{display:none;background:none;border:1px solid var(--c-line);color:var(--c-dim);padding:7px 20px;border-radius:100px;font-size:12px;cursor:pointer;transition:all .3s ease,margin-top .4s ease;margin-bottom:48px;margin-top:4px}
.expand-btn:hover{color:var(--c-fg);border-color:rgba(255,255,255,.18)}
.expand-btn.open{margin-top:16px}
.expand-btn .arr{display:inline-block;transition:transform .35s ease;margin-left:2px;font-size:16px}
.expand-btn.open .arr{transform:rotate(180deg)}

.btns{display:flex;gap:14px;flex-wrap:wrap;justify-content:center}
.btn{padding:12px 32px;border-radius:100px;font-size:14px;font-weight:500;cursor:pointer;transition:all .3s ease;text-decoration:none;display:inline-flex;align-items:center;gap:6px;border:none}
.btn-white{background:var(--c-fg);color:var(--c-bg);font-weight:600}
.btn-white:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(255,255,255,.1)}
.btn-outline{background:transparent;border:1px solid rgba(255,255,255,.2);color:var(--c-fg)}
.btn-outline:hover{border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.03)}

.fade{opacity:0;transform:translateY(16px);animation:fadeIn .8s ease forwards}
.f1{animation-delay:.1s}.f2{animation-delay:.2s}.f3{animation-delay:.3s}.f4{animation-delay:.4s}.f5{animation-delay:.5s}
@keyframes fadeIn{to{opacity:1;transform:none}}

@media(max-width:640px){
  .wrap{padding:30px 16px}
  .title-main{font-size:clamp(36px,14vw,64px);letter-spacing:4px}
  .pills-wrap{gap:8px;margin-bottom:10px}
  .pill{padding:8px 16px;font-size:12px}
  .mobile-extras{display:flex}
  .expand-btn{display:inline-block}
}
</style>
</head>
<body>

<div class="geo">
<svg viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="rgba(255,255,255,.025)" stroke-width=".4"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  <!-- Circles -->
  <circle cx="10%" cy="20%" r="60" fill="rgba(255,255,255,.04)"/>
  <circle cx="85%" cy="15%" r="40" fill="rgba(255,255,255,.06)"/>
  <circle cx="50%" cy="75%" r="80" fill="rgba(255,255,255,.03)"/>
  <circle cx="92%" cy="55%" r="25" fill="rgba(255,255,255,.08)"/>
  <circle cx="5%" cy="60%" r="35" fill="rgba(255,255,255,.05)"/>
  <circle cx="70%" cy="85%" r="50" fill="rgba(255,255,255,.04)"/>
  <!-- Squares -->
  <rect x="25%" y="10%" width="30" height="30" fill="rgba(255,255,255,.05)" transform="rotate(15 25% 10%)"/>
  <rect x="55%" y="20%" width="20" height="20" fill="rgba(255,255,255,.07)" transform="rotate(30 55% 20%)"/>
  <rect x="80%" y="70%" width="45" height="45" fill="rgba(255,255,255,.04)" transform="rotate(45 80% 70%)"/>
  <rect x="12%" y="80%" width="25" height="25" fill="rgba(255,255,255,.06)" transform="rotate(10 12% 80%)"/>
  <!-- Triangles -->
  <polygon points="40%,88% 43%,78% 46%,88%" fill="rgba(255,255,255,.06)"/>
  <polygon points="90%,35% 94%,28% 98%,35%" fill="rgba(255,255,255,.05)"/>
  <!-- Lines -->
  <line x1="5%" y1="50%" x2="25%" y2="40%" stroke="rgba(255,255,255,.04)" stroke-width="1.5"/>
  <line x1="75%" y1="10%" x2="95%" y2="30%" stroke="rgba(255,255,255,.03)" stroke-width="1"/>
  <!-- Dots -->
  <circle cx="18%" cy="35%" r="3" fill="rgba(255,255,255,.2)"/>
  <circle cx="65%" cy="50%" r="2" fill="rgba(255,255,255,.15)"/>
  <circle cx="45%" cy="15%" r="2.5" fill="rgba(255,255,255,.18)"/>
  <circle cx="30%" cy="55%" r="1.5" fill="rgba(255,255,255,.12)"/>
  <circle cx="88%" cy="80%" r="4" fill="rgba(255,255,255,.1)"/>
</svg>
</div>

<div class="wrap">
  <div class="title-block fade f1">
    <div class="title-sub">Reading Platform</div>
    <h1 class="title-main"><b>MINIREAD</b> 极读</h1>
    <div class="title-line"></div>
  </div>

  <div class="pills-wrap fade f3" id="pillsRow">
    <span class="pill highlight">全格式支持</span>
    <span class="pill highlight">智能书签</span>
    <span class="pill highlight">深色模式</span>
    <span class="pill highlight">在线搜书</span>
    <span class="pill highlight">阅读进度</span>
  </div>

  <div class="mobile-extras" id="mobileExtras"></div>
  <button class="expand-btn fade f3" id="expandBtn" onclick="toggleExtras()">展开更多<span class="arr">⌄</span></button>

  <div class="btns fade f5">
    {% if logged_in %}
    <a href="/main" class="btn btn-white">进入阅读 →</a>
    {% else %}
    <a href="/login" class="btn btn-white">进入阅读 →</a>
    <a href="/login?tab=register" class="btn btn-outline">创建账号</a>
    {% endif %}
  </div>
</div>

<script>
(function(){
  var mq=window.matchMedia('(max-width:640px)'),expanded=false;
  function layout(){
    var p=byId('pillsRow'),e=byId('mobileExtras'),b=byId('expandBtn'),ps=p?p.querySelectorAll('.pill'):[];
    if(!p||!e||!b)return;
    if(mq.matches){
      for(var i=ps.length-1;i>=3;i--){e.insertBefore(ps[i],e.firstChild)}
      e.classList.remove('show');b.classList.remove('open');b.innerHTML='展开更多<span class="arr">⌄</span>';
      b.style.display='inline-block';expanded=false;
    }else{
      var es=e.querySelectorAll('.pill');for(var i=0;i<es.length;i++)p.appendChild(es[i]);
      e.classList.remove('show');b.classList.remove('open');b.style.display='none';expanded=false;
    }
  }
  layout();mq.addListener(layout);
  window.toggleExtras=function(){
    var e=byId('mobileExtras'),b=byId('expandBtn');
    expanded=!expanded;
    if(expanded){e.classList.add('show');b.classList.add('open');b.innerHTML='收起更多<span class="arr">⌄</span>'}
    else{e.classList.remove('show');b.classList.remove('open');b.innerHTML='展开更多<span class="arr">⌄</span>'}
  };
  function byId(id){return document.getElementById(id)}
})();
</script>
</body>
</html>
